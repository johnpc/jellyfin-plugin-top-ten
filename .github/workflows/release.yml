name: Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x
    
    - name: Restore dependencies
      run: dotnet restore jellyfin-plugin-top-ten.sln
    
    - name: Build
      run: dotnet build jellyfin-plugin-top-ten.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=false
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create release directory
      run: |
        mkdir -p release
        find . -path "*/bin/Release/net9.0/*.dll" -exec cp {} release/ \;
    
    - name: Create zip file
      run: |
        cd release
        zip -r ../jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip .
        cd ..
    
    - name: Calculate checksum
      id: calculate_checksum
      run: |
        CHECKSUM=$(md5sum jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip | awk '{ print $1 }')
        echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
    
    - name: Create manifest.json
      run: |
        cat > manifest.json << MANIFEST_EOF
        [
          {
            "guid": "b9c59d7a-1f2f-5e2g-0c4f-9d6g8e7f5b4c",
            "name": "Top Ten",
            "overview": "Create top 10 collections based on user ratings",
            "description": "Create top 10 collections based on user ratings",
            "owner": "jellyfin-plugin-top-ten",
            "category": "General",
            "versions": [
              {
                "version": "${{ steps.get_version.outputs.VERSION }}",
                "changelog": "See the full changelog at [GitHub](https://github.com/johnpc/jellyfin-plugin-top-ten/releases/tag/${{ steps.get_version.outputs.VERSION }})",
                "targetAbi": "10.11.0.0",
                "sourceUrl": "https://github.com/johnpc/jellyfin-plugin-top-ten/releases/download/${{ steps.get_version.outputs.VERSION }}/jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip",
                "checksum": "${{ steps.calculate_checksum.outputs.CHECKSUM }}",
                "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              }
            ]
          }
        ]
        MANIFEST_EOF
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip
          manifest.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
