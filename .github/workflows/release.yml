name: Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore /p:TreatWarningsAsErrors=false
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create release directory
      run: |
        mkdir -p release
        find . -path "*/bin/Release/net9.0/*.dll" -exec cp {} release/ \;
    
    - name: Create zip file
      run: |
        cd release
        zip -r ../jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip .
        cd ..
    
    - name: Calculate checksum
      id: calculate_checksum
      run: |
        CHECKSUM=$(md5sum jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip | awk '{ print $1 }')
        echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
    
    - name: Create manifest for this release
      run: |
        cat > release-manifest.json << MANIFEST_EOF
        [{
          "guid": "$(jq -r '.[0].guid' manifest.json)",
          "name": "$(jq -r '.[0].name' manifest.json)",
          "overview": "$(jq -r '.[0].overview' manifest.json)",
          "description": "$(jq -r '.[0].description' manifest.json)",
          "owner": "$(jq -r '.[0].owner' manifest.json)",
          "category": "$(jq -r '.[0].category' manifest.json)",
          "versions": [{
            "version": "${{ steps.get_version.outputs.VERSION }}",
            "changelog": "See the full changelog at [GitHub](https://github.com/johnpc/jellyfin-plugin-top-ten/releases/tag/${{ steps.get_version.outputs.VERSION }})",
            "targetAbi": "10.11.0.0",
            "sourceUrl": "https://github.com/johnpc/jellyfin-plugin-top-ten/releases/download/${{ steps.get_version.outputs.VERSION }}/jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip",
            "checksum": "${{ steps.calculate_checksum.outputs.CHECKSUM }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }]
        }]
        MANIFEST_EOF
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip
          release-manifest.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update main manifest
      run: |
        chmod +x generate_manifest.sh
        ./generate_manifest.sh
        
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add manifest.json
        git commit -m "Update manifest.json with version ${{ steps.get_version.outputs.VERSION }}" || echo "No changes to commit"
        git push origin main || echo "Nothing to push"
