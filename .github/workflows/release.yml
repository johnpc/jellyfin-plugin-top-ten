name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get next version
      id: get_version
      run: |
        LATEST=$(git tag --sort=-v:refname | head -1 | sed 's/^v//')
        if [ -z "$LATEST" ]; then
          LATEST="0.0.0.0"
        fi
        NEXT=$(echo "$LATEST" | awk -F. '{$NF=$NF+1; print}' OFS=.)
        echo "VERSION=$NEXT" >> $GITHUB_OUTPUT
        echo "Next version: $NEXT"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore jellyfin-plugin-top-ten.sln

    - name: Build
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        dotnet build jellyfin-plugin-top-ten.sln --configuration Release --no-restore \
          /p:TreatWarningsAsErrors=false \
          /p:Version=$VERSION \
          /p:AssemblyVersion=$VERSION \
          /p:FileVersion=$VERSION

    - name: Create release zip
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        mkdir -p release
        find . -path "*/bin/Release/net9.0/*.dll" -exec cp {} release/ \;
        cd release
        zip -r ../jellyfin-plugin-top-ten-${VERSION}.zip .

    - name: Calculate checksum
      id: calculate_checksum
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        CHECKSUM=$(md5sum jellyfin-plugin-top-ten-${VERSION}.zip | awk '{ print $1 }')
        echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT

    - name: Generate manifest.json
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        CHECKSUM=${{ steps.calculate_checksum.outputs.CHECKSUM }}
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        cat > manifest.json << EOF
        [
          {
            "guid": "e29b0e3d-f15a-47e6-9f05-d8f4e6260a4e",
            "name": "Top Ten",
            "overview": "Create top 10 collections based on user ratings",
            "description": "Create top 10 collections based on user ratings",
            "owner": "johnpc",
            "category": "General",
            "versions": [
              {
                "version": "${VERSION}",
                "changelog": "See the full changelog at [GitHub](https://github.com/johnpc/jellyfin-plugin-top-ten/releases/tag/${VERSION})",
                "targetAbi": "10.11.0.0",
                "sourceUrl": "https://github.com/johnpc/jellyfin-plugin-top-ten/releases/download/${VERSION}/jellyfin-plugin-top-ten-${VERSION}.zip",
                "checksum": "${CHECKSUM}",
                "timestamp": "${TIMESTAMP}"
              }
            ]
          }
        ]
        EOF

    - name: Create tag and GitHub Release
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$VERSION"
        git push origin "$VERSION"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        files: |
          jellyfin-plugin-top-ten-${{ steps.get_version.outputs.VERSION }}.zip
          manifest.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update manifest on main
      run: |
        git fetch origin main
        git checkout main
        git add manifest.json
        git commit -m "chore: update manifest for ${{ steps.get_version.outputs.VERSION }}" || true
        git push origin main
